tunnel: sardor-furnitura
credentials-file: C:\Users\%USERNAME%\.cloudflared\sardor-furnitura.json

ingress:
  # Frontend (React app)
  - hostname: sardor-furnitura.your-domain.com
    service: http://localhost:5173
  
  # Backend API
  - hostname: api-sardor-furnitura.your-domain.com
    service: http://localhost:3003
  
  # Catch-all rule (required)
  - service: http_status:404